<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450" width="100%" height="100%">
  <!-- Definitions for gradients and filters -->
  <defs>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#141a29" />
      <stop offset="60%" stop-color="#1b263b" />
      <stop offset="100%" stop-color="#2e3b56" />
    </linearGradient>
    <linearGradient id="brickGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2c302e" />
      <stop offset="50%" stop-color="#3d4240" />
      <stop offset="100%" stop-color="#2c302e" />
    </linearGradient>
    <linearGradient id="vestGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffee00" />
      <stop offset="100%" stop-color="#d4af37" />
    </linearGradient>
    <filter id="shakeGlitch" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.05" numOctaves="1" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="3" xChannelSelector="R" yChannelSelector="G" />
    </filter>
  </defs>

  <!-- Background Sky -->
  <rect width="600" height="450" fill="url(#skyGrad)" />

  <!-- Stars in sky -->
  <circle cx="80" cy="50" r="1.5" fill="#ffffff" opacity="0.6" />
  <circle cx="150" cy="80" r="1" fill="#ffffff" opacity="0.4" />
  <circle cx="280" cy="40" r="2" fill="#ffffff" opacity="0.8" />
  <circle cx="340" cy="90" r="1.5" fill="#ffffff" opacity="0.5" />
  <circle cx="520" cy="60" r="1" fill="#ffffff" opacity="0.3" />

  <!-- Ground / Pavement -->
  <rect x="0" y="380" width="600" height="70" fill="#2b2d2f" />
  <rect x="0" y="380" width="600" height="5" fill="#e0a915" opacity="0.8" /> <!-- Safety stripe -->

  <!-- Towering Wall on the Right -->
  <path d="M 450,0 L 600,0 L 600,380 L 450,380 Z" fill="url(#brickGrad)" />
  <!-- Brick joint lines -->
  <line x1="450" y1="80" x2="600" y2="80" stroke="#1d201e" stroke-width="2" />
  <line x1="450" y1="160" x2="600" y2="160" stroke="#1d201e" stroke-width="2" />
  <line x1="450" y1="240" x2="600" y2="240" stroke="#1d201e" stroke-width="2" />
  <line x1="450" y1="320" x2="600" y2="320" stroke="#1d201e" stroke-width="2" />
  <!-- AC Unit Silhouette high up -->
  <rect x="470" y="100" width="80" height="50" rx="4" fill="#151716" />
  <line x1="470" y1="140" x2="550" y2="140" stroke="#ffcc00" stroke-width="1.5" stroke-dasharray="4 3" />

  <!-- DANGER HEIGHT SIGN -->
  <g transform="translate(480, 260) scale(0.6)">
    <polygon points="30,0 60,50 0,50" fill="#e0a915" stroke="#000" stroke-width="2" />
    <text x="30" y="42" font-family="'Space Grotesk', sans-serif" font-weight="900" font-size="28" fill="#000" text-anchor="middle">!</text>
  </g>

  <!-- PETRO: Standing & Shaking on the Left -->
  <g id="petro" transform="translate(180, 200)">
    <!-- Shaking shadow -->
    <ellipse cx="70" cy="180" rx="35" ry="8" fill="#000000" opacity="0.4" />

    <!-- Shaking lines (trembling effect visual) -->
    <path d="M 15,150 Q 10,155 15,160 M 120,150 Q 125,155 120,160" stroke="#ffffff" stroke-width="1.5" fill="none" opacity="0.6" stroke-linecap="round" />

    <!-- Legs (knock-kneed, trembling) -->
    <!-- Left Leg -->
    <path d="M 50,130 L 62,155 L 55,180" stroke="#1a2d42" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" fill="none" />
    <!-- Right Leg -->
    <path d="M 90,130 L 78,155 L 85,180" stroke="#1a2d42" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" fill="none" />
    <!-- Boots -->
    <rect x="42" y="175" width="22" height="10" rx="4" fill="#3a2212" />
    <rect x="76" y="175" width="22" height="10" rx="4" fill="#3a2212" />

    <!-- Torso (Yellow Vest) -->
    <path d="M 40,80 L 100,80 L 110,130 L 30,130 Z" fill="url(#vestGrad)" stroke="#3a3200" stroke-width="3" />
    <!-- Vest reflective stripes -->
    <rect x="48" y="85" width="10" height="45" fill="#e2f1f7" />
    <rect x="82" y="85" width="10" height="45" fill="#e2f1f7" />
    <rect x="35" y="110" width="70" height="6" fill="#e2f1f7" />

    <!-- Arms -->
    <!-- Left arm holding drill -->
    <path d="M 35,85 L 15,110 L 30,130" stroke="#e0a915" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" fill="none" />
    <!-- Big Drill -->
    <g transform="translate(10, 115) rotate(-20)">
      <rect x="0" y="0" width="35" height="20" rx="3" fill="#1c2022" />
      <rect x="8" y="15" width="8" height="15" fill="#111" />
      <rect x="30" y="7" width="20" height="6" fill="#7f8c8d" />
      <line x1="50" y1="10" x2="65" y2="10" stroke="#bdc3c7" stroke-width="2" />
    </g>

    <!-- Right arm pointing up/nervous -->
    <path d="M 105,85 C 125,95 130,85 120,65" stroke="#e0a915" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" fill="none" />

    <!-- Head and Neck -->
    <rect x="62" y="65" width="16" height="20" fill="#fcdbb0" />
    <circle cx="70" cy="50" r="22" fill="#fcdbb0" stroke="#d5b080" stroke-width="2" />

    <!-- Face details -->
    <!-- Nervous big eyes -->
    <circle cx="62" cy="46" r="6" fill="#ffffff" />
    <circle cx="62" cy="46" r="2.5" fill="#000000" />
    <circle cx="78" cy="46" r="6" fill="#ffffff" />
    <circle cx="78" cy="46" r="2.5" fill="#000000" />
    <!-- Nervous wavy mouth -->
    <path d="M 62,60 Q 66,57 70,60 Q 74,63 78,60" stroke="#000000" stroke-width="2.5" fill="none" stroke-linecap="round" />
    <!-- Sweat drops -->
    <path d="M 42,42 Q 40,48 42,50" stroke="#33a8ff" stroke-width="2" fill="none" stroke-linecap="round" />
    <path d="M 98,46 Q 100,52 98,54" stroke="#33a8ff" stroke-width="2" fill="none" stroke-linecap="round" />

    <!-- White Safety Helmet -->
    <path d="M 45,36 C 45,15 95,15 95,36 Z" fill="#ffffff" stroke="#bdc3c7" stroke-width="2" />
    <rect x="42" y="32" width="56" height="6" rx="3" fill="#ffffff" stroke="#bdc3c7" stroke-width="2" />
    <rect x="66" y="16" width="8" height="16" fill="#e74c3c" /> <!-- Red stripe on helmet -->
  </g>

  <!-- Pigeons laughing on the left curb -->
  <g transform="translate(50, 340)">
    <!-- Pigeon 1 -->
    <ellipse cx="20" cy="30" rx="14" ry="10" fill="#7f8c8d" />
    <circle cx="28" cy="18" r="8" fill="#7f8c8d" />
    <polygon points="34,16 42,19 34,22" fill="#f39c12" />
    <!-- Pigeon eye -->
    <circle cx="28" cy="16" r="2" fill="#f1c40f" />
    <circle cx="28" cy="16" r="0.8" fill="#000" />
    <!-- Wing -->
    <ellipse cx="16" cy="30" rx="8" ry="5" fill="#95a5a6" />
    <!-- Feet -->
    <line x1="16" y1="40" x2="16" y2="46" stroke="#e67e22" stroke-width="2" />
    <line x1="24" y1="40" x2="24" y2="46" stroke="#e67e22" stroke-width="2" />
    <!-- Speech bubble -->
    <path d="M 25,-10 L 85,-10 C 90,-10 90,-25 90,-25 C 90,-25 90,-40 85,-40 L 25,-40 C 20,-40 20,-25 20,-25 L 15,-15 Z" fill="#ffffff" />
    <text x="55" y="-22" font-family="'Inter', sans-serif" font-weight="bold" font-size="10" fill="#000" text-anchor="middle">Хі-хі-хі!</text>
  </g>

  <!-- Pigeons laughing on the wall ledge -->
  <g transform="translate(420, 110) scale(0.8)">
    <ellipse cx="20" cy="30" rx="14" ry="10" fill="#7f8c8d" />
    <circle cx="28" cy="18" r="8" fill="#7f8c8d" />
    <polygon points="34,16 40,18 34,20" fill="#f39c12" />
    <circle cx="28" cy="16" r="1.5" fill="#f1c40f" />
  </g>

  <!-- Floating Text / Thought bubble -->
  <g transform="translate(60, 100)">
    <rect x="0" y="0" width="220" height="70" rx="10" fill="#ffffff" opacity="0.95" />
    <!-- Speech bubble triangle tail -->
    <polygon points="120,70 135,70 145,85" fill="#ffffff" opacity="0.95" />
    <text x="110" y="28" font-family="'Inter', sans-serif" font-size="14" font-weight="bold" fill="#1b263b" text-anchor="middle">5-й поверх?!</text>
    <text x="110" y="48" font-family="'Inter', sans-serif" font-size="12" fill="#555" text-anchor="middle">Там же голуби як мухи...</text>
  </g>
</svg>

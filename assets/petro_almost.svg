<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450" width="100%" height="100%">
  <defs>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#050810" />
      <stop offset="60%" stop-color="#0f1624" />
      <stop offset="100%" stop-color="#1c283f" />
    </linearGradient>
    <linearGradient id="brickWall" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#323537" />
      <stop offset="100%" stop-color="#1f2122" />
    </linearGradient>
    <linearGradient id="vestGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffee00" />
      <stop offset="100%" stop-color="#d4af37" />
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="600" height="450" fill="url(#skyGrad)" />
  
  <!-- Far away city lights below -->
  <path d="M 0,400 L 600,400 L 600,450 L 0,450 Z" fill="#000000" />
  <circle cx="50" cy="410" r="1.5" fill="#f1c40f" opacity="0.6" />
  <circle cx="120" cy="425" r="1.5" fill="#e74c3c" opacity="0.4" />
  <circle cx="280" cy="415" r="2" fill="#ffd32d" opacity="0.7" />
  <circle cx="340" cy="430" r="1" fill="#fff" opacity="0.5" />
  <circle cx="490" cy="420" r="2" fill="#ffd32d" opacity="0.6" />

  <!-- Wind gusts -->
  <path d="M 120,40 Q 250,55 380,40 M 200,320 Q 320,335 440,320" stroke="#ffffff" stroke-width="1.5" fill="none" opacity="0.2" stroke-dasharray="10 12" />

  <!-- Wall on the Left (5th floor corner) -->
  <path d="M 0,0 L 250,0 L 220,450 L 0,450 Z" fill="url(#brickWall)" stroke="#1a1c1d" stroke-width="3" />
  <line x1="0" y1="80" x2="245" y2="80" stroke="#171819" stroke-width="2" />
  <line x1="0" y1="160" x2="239" y2="160" stroke="#171819" stroke-width="2" />
  <line x1="0" y1="240" x2="234" y2="240" stroke="#171819" stroke-width="2" />
  <line x1="0" y1="320" x2="228" y2="320" stroke="#171819" stroke-width="2" />

  <!-- Window opening (with a tiny ledge) -->
  <rect x="0" y="50" width="130" height="220" fill="#000000" stroke="#171819" stroke-width="4" />
  <!-- Ledge -->
  <rect x="0" y="260" width="160" height="20" fill="#4b5052" stroke="#2b2d2e" stroke-width="3" />

  <!-- PETRO: Balancing on the windowsill ledge, holding AC -->
  <g transform="translate(90, 80)">
    <!-- Shaking lines -->
    <path d="M 90,80 Q 95,85 90,90" stroke="#fff" stroke-width="1.5" fill="none" opacity="0.5" />

    <!-- Legs balancing -->
    <!-- Left leg standing on ledge -->
    <path d="M 30,120 L 40,182" stroke="#1a2d42" stroke-width="12" stroke-linecap="round" fill="none" />
    <!-- Right leg kicking in mid-air -->
    <path d="M 55,120 Q 80,140 100,165" stroke="#1a2d42" stroke-width="12" stroke-linecap="round" fill="none" />
    <!-- Boots -->
    <rect x="30" y="178" width="18" height="12" rx="2" fill="#3a2212" />
    <rect x="94" y="158" width="18" height="12" rx="2" fill="#3a2212" transform="rotate(30 94 158)" />

    <!-- Torso leaning forward/outwards -->
    <path d="M 20,50 L 60,45 L 75,110 L 15,115 Z" fill="url(#vestGrad)" stroke="#3a3200" stroke-width="2" />
    <rect x="25" y="55" width="25" height="6" fill="#e2f1f7" transform="rotate(-5 25 55)" />
    <rect x="25" y="75" width="25" height="6" fill="#e2f1f7" transform="rotate(-5 25 75)" />

    <!-- Left hand holding wobbly AC -->
    <path d="M 20,55 C 5,60 -5,80 20,95" stroke="#e0a915" stroke-width="9" stroke-linecap="round" fill="none" />
    <!-- Right hand holding cord of hanging drill -->
    <path d="M 60,55 C 80,60 90,85 85,110" stroke="#e0a915" stroke-width="9" stroke-linecap="round" fill="none" />
    
    <!-- Cord and Drill hanging -->
    <path d="M 85,110 Q 88,140 70,175" stroke="#222" stroke-width="2.5" fill="none" />
    <g transform="translate(58, 172) rotate(70)">
      <rect x="0" y="0" width="30" height="16" rx="2" fill="#1c2022" />
      <rect x="6" y="12" width="6" height="10" fill="#111" />
      <rect x="25" y="5" width="12" height="5" fill="#7f8c8d" />
      <!-- Red warning glowing dot on drill -->
      <circle cx="15" cy="8" r="3.5" fill="#e74c3c">
        <animate attributeName="opacity" values="0.2;1;0.2" dur="0.8s" repeatCount="indefinite" />
      </circle>
    </g>

    <!-- Head: sweating profusely, screaming -->
    <rect x="30" y="27" width="14" height="15" fill="#fcdbb0" />
    <circle cx="37" cy="18" r="18" fill="#fcdbb0" stroke="#d5b080" stroke-width="2" />
    <!-- Screaming facial features -->
    <circle cx="30" cy="14" r="2.5" fill="#000" />
    <circle cx="44" cy="14" r="2.5" fill="#000" />
    <!-- Sweat drops -->
    <path d="M 12,12 Q 5,14 5,20" stroke="#33a8ff" stroke-width="1.5" fill="none" />
    <!-- Big open mouth -->
    <ellipse cx="37" cy="27" rx="6" ry="8" fill="#000000" />
    <path d="M 34,29 Q 37,27 40,29" fill="none" stroke="#ffffff" stroke-width="2" /> <!-- teeth -->

    <!-- Helmet slipping off -->
    <g transform="translate(15, -12) rotate(-20)">
      <path d="M 10,18 C 10,3 50,3 50,18 Z" fill="#ffffff" stroke="#bdc3c7" stroke-width="1.5" />
      <rect x="5" y="15" width="50" height="4" rx="2" fill="#ffffff" stroke="#bdc3c7" stroke-width="1.5" />
      <rect x="27" y="4" width="6" height="13" fill="#e74c3c" />
    </g>
  </g>

  <!-- WOBBLY AC UNIT -->
  <g transform="translate(210, 105) rotate(12)">
    <!-- Brackets detached on one side (cracked concrete sparks) -->
    <line x1="-15" y1="60" x2="5" y2="60" stroke="#ff3f34" stroke-width="3" stroke-dasharray="3 3" />
    <rect x="0" y="0" width="110" height="70" rx="5" fill="#eef2f3" stroke="#ff3f34" stroke-width="3" />
    <circle cx="35" cy="35" r="24" fill="#d1d8e0" />
    <line x1="35" y1="35" x2="20" y2="20" stroke="#4b6584" stroke-width="3" />
    <line x1="35" y1="35" x2="50" y2="50" stroke="#4b6584" stroke-width="3" />
    <!-- Wobble vibration lines -->
    <path d="M 115,20 Q 120,25 115,30 M 115,40 Q 120,45 115,50" stroke="#e74c3c" stroke-width="2" fill="none" />
  </g>

  <!-- VALERA THE PIGEON: On a window ledge of building on right, staring at a piece of BREAD! -->
  <g transform="translate(430, 200)">
    <!-- Wall piece -->
    <rect x="30" y="40" width="140" height="150" fill="#2c2f30" />
    <rect x="10" y="40" width="160" height="15" fill="#1b1c1d" />

    <!-- Piece of BREAD -->
    <rect x="50" y="27" width="18" height="13" rx="3" fill="#f5cd79" stroke="#cf8a13" stroke-width="1.5" />
    <circle cx="54" cy="31" r="1.5" fill="#8b5a00" opacity="0.7" />
    <circle cx="62" cy="35" r="1.5" fill="#8b5a00" opacity="0.7" />

    <!-- Valera looking in absolute trance at the bread -->
    <g transform="translate(80, -10)">
      <ellipse cx="25" cy="35" rx="16" ry="11" fill="#5d6d7e" />
      <circle cx="12" cy="22" r="9" fill="#5d6d7e" />
      <polygon points="4,20 -3,23 4,26" fill="#f39c12" />
      
      <!-- Big hypnotized eyes! -->
      <circle cx="12" cy="20" r="3.5" fill="#ffffff" />
      <circle cx="12" cy="20" r="1.8" fill="#e67e22" />
      <circle cx="12" cy="20" r="0.8" fill="#000" />
      
      <!-- Wing on back -->
      <ellipse cx="28" cy="35" rx="10" ry="6" fill="#34495e" />
      <!-- Feet -->
      <line x1="20" y1="46" x2="20" y2="52" stroke="#d35400" stroke-width="2" />
      <line x1="28" y1="46" x2="28" y2="52" stroke="#d35400" stroke-width="2" />

      <!-- Love hearts from Valera to bread -->
      <path d="M 3,5 C 0,2 0,-3 3,-5 C 6,-3 6,2 3,5 Z" fill="#e74c3c" transform="translate(-15, 0) scale(0.6)" />
    </g>
  </g>

  <!-- Floating warning text -->
  <g transform="translate(220, 20)">
    <rect x="0" y="0" width="180" height="50" rx="6" fill="#e74c3c" />
    <text x="90" y="24" font-family="'Space Grotesk', sans-serif" font-weight="900" font-size="14" fill="#ffffff" text-anchor="middle">5-Й ПОВЕРХ!</text>
    <text x="90" y="40" font-family="'Inter', sans-serif" font-size="10" fill="#ffffff" text-anchor="middle">Назад вороття немає...</text>
  </g>
</svg>
